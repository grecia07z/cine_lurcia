<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <h1>Cartelera</h1>
        <div class="filtros">
            <input type="text" id="buscador" placeholder="buscar peliculas...">
            <select id="filtro-genero">
                <option value="Todos">Todos lo generos</option>
                <option value="Acción">Accion</option>
                <option value="Ciencia Ficción">Ciencia Ficcion</option>
                <option value="Drama">Drama</option>
                <option value="Terror">Terror</option>
            </select>
        </div>
    </header>

    <main>
        <section id="contenedor-peliculas" class="cartelera"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
